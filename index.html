<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KCNX OS FINAL WINDOWS STYLE</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI";
}
body {
  overflow: hidden;
  background: black;
  color: white;
}

/* MAIN */
#main {
  width: 100%;
  height: 100vh;
  background: url('https://i.ibb.co/PZkTNWgp/peakpx-1.jpg') center/cover;
  position: relative;
}

/* TIME (LEFT BOTTOM) */
#mainTime {
  position: absolute;
  bottom: 20px;
  left: 20px;
}
#mTime {
  font-size: 28px;
}
#mDate {
  font-size: 14px;
  opacity: 0.8;
}

/* >>> */
.start-btn {
  position: absolute;
  bottom: 20px;
  right: 20px;
  font-size: 22px;
  cursor: pointer;
}

/* BLUR LOGIN */
#blurLayer {
  position: absolute;
  width: 100%;
  height: 100%;
  backdrop-filter: blur(15px);
  background: rgba(0, 0, 0, 0.4);
  display: none;
  justify-content: center;
  align-items: center;
}

/* LOGIN */
.profile-img {
  width: 90px;
  border-radius: 50%;
}
.login-box {
  display: flex;
  background: rgba(0, 0, 0, 0.6);
  padding: 8px;
}
.login-box input {
  background: transparent;
  border: none;
  color: white;
  padding: 10px;
  outline: none;
}
.arrow-btn {
  background: transparent;
  border: none;
  color: white;
  cursor: pointer;
}

/* KCNX Button (small, top right of login) */
#kcnxButton {
  position: absolute;
  top: 10px;
  right: 10px;
  font-size: 14px;
  background: rgba(255,255,255,0.2);
  border: none;
  padding: 4px 8px;
  border-radius: 4px;
  cursor:pointer;
  font-family: "Segoe UI";
  color: white;
}
#kcnxButton:hover {
  background: rgba(255,255,255,0.4);
}

/* Main screen window button replaced with emoji, style inline in HTML */

/* DESKTOP */
#desktop {
  display: none;
  width: 100%;
  height: 100vh;
  background: url('https://i.ibb.co/BKzS8P5y/peakpx.jpg') center/cover;
  position: relative;
}

/* WINDOWS STYLE ICON GRID */
#desktopIcons {
  position: absolute;
  top: 20px;
  left: 20px;
  display: grid;
  grid-template-columns: repeat(1, 80px);
  grid-auto-rows: 90px;
  gap: 15px;
}

.icon {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.icon img {
  width: 48px;
  height: 48px;
}

.icon span {
  font-size: 12px;
  margin-top: 5px;
  text-align: center;
}

/* TASKBAR */
#taskbar {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 50px;
  background: rgba(0, 0, 0, 0.7);
  display: flex;
  align-items: center;
}

/* START MENU */
#startMenu {
  position: absolute;
  bottom: 50px;
  left: 0;
  width: 250px;
  height: 300px;
  background: rgba(0, 0, 0, 0.9);
  display: none;
  padding: 10px;
}
.shutdown {
  margin-top: auto;
  background: red;
  padding: 5px;
  text-align: center;
  cursor: pointer;
}

/* TASK TIME */
#taskTime {
  margin-left: auto;
  padding: 10px;
}

/* SHUTDOWN */
#shutdown {
  display: none;
  position: absolute;
  width: 100%;
  height: 100%;
  background: black;
  justify-content: center;
  align-items: center;
  font-size: 30px;
}
</style>
</head>

<body onclick="startSound()">

<!-- Background sound -->
<audio id="backgroundSound" src="https://files.catbox.moe/522394.mp3" loop></audio>
<!-- Ring sound -->
<audio id="ringSound" src="https://files.catbox.moe/522394.mp3"></audio>

<!-- MAIN -->
<div id="main">
  <div id="mainTime">
    <div id="mTime"></div>
    <div id="mDate"></div>
  </div>

  <div class="start-btn" onclick="showLogin(event)">>>></div>

  <!-- KCNX Button -->
  <button id="kcnxButton" onclick="goFullScreen()">⨁ Enter KCNX OS</button>

  <!-- Main screen window button replaced with emoji -->
  <div 
    id="startBtn" 
    onclick="goFullScreen()" 
    title="Fullscreen" 
    style="position: absolute; top: 10px; right: 10px; font-size: 24px; cursor: pointer;"
  >
    🪟
  </div>

  <div id="blurLayer" onclick="closeBlur()">
    <div onclick="event.stopPropagation()">
      <img src="https://i.ibb.co/4pDNDk1/avatar.png" class="profile-img" />
      <div class="login-box">
        <input
          type="password"
          id="pass"
          placeholder="Enter password"
          onkeydown="if(event.key==='Enter'){login();}"
        />
        <button class="arrow-btn" onclick="login()">→</button>
      </div>
    </div>
  </div>
</div>

<!-- DESKTOP -->
<div id="desktop" onclick="closeStart()">
  <!-- ICONS -->
  <div id="desktopIcons">
    <div class="icon" onclick="openApp('https://www.bing.com')">
      <img src="https://cdn-icons-png.flaticon.com/512/732/732221.png" />
      <span>Microsoft Edge</span>
    </div>

    <div class="icon" onclick="openApp('https://www.bing.com')">
      <img src="https://cdn-icons-png.flaticon.com/512/300/300221.png" />
      <span>Bing</span>
    </div>

    <div class="icon" onclick="openApp('#')">
      <img src="https://i.ibb.co/DPcwkwjW/windows-10-recreation-file-and-internet-explorer-yellow-and-blue-folder-illustration-png-clipart.jpg" />
      <span>Folder</span>
    </div>

    <div class="icon" onclick="openApp('https://i.ibb.co/vxzNSDjR/recycling-bin-trash-rubbish-bins-waste-paper-baskets-computer-icons-window-thumbnail.jpg')">
      <img src="https://i.ibb.co/vxzNSDjR/recycling-bin-trash-rubbish-bins-waste-paper-baskets-computer-icons-window-thumbnail.jpg" />
      <span>Recycle Bin</span>
    </div>
  </div>

  <!-- START MENU -->
  <div id="startMenu">
    <div>Start Menu</div>
    <div class="shutdown" onclick="shutdown()">Shutdown</div>
  </div>

  <!-- TASKBAR -->
  <div id="taskbar">
    <div onclick="toggleStart()">🪟</div>
    <div id="taskTime"></div>
    <!-- Example widgets -->
    <div style="margin-left:auto; display:flex; gap:10px; align-items:center;">
      <div style="font-size:14px;">Weather: Sunny</div>
      <div style="font-size:14px;">Sensex: +150 pts</div>
    </div>
  </div>
</div>

<!-- SHUTDOWN -->
<div id="shutdown">Shutting down...</div>

<script>
/* SOUND & RING */
const backgroundSound = document.getElementById("backgroundSound");
const ringSound = document.getElementById("ringSound");

// Play background sound once when opened
window.onload = () => {
  backgroundSound.play().catch(()=>{});
  setTimeout(() => {
    ringSound.play().catch(()=>{});
  }, 5000);
};

/* TIME */
setInterval(()=>{
  const n = new Date();
  document.getElementById('mTime').innerText = n.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  document.getElementById('mDate').innerText = n.toDateString();
  document.getElementById('taskTime').innerText = n.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
},1000);

/* LOGIN */
function showLogin(e){e.stopPropagation();document.getElementById('blurLayer').style.display="flex";}
function closeBlur(){document.getElementById('blurLayer').style.display="none";}
function login(){
  const pw = document.getElementById('pass').value;
  if(pw==="12345"){
    document.getElementById('main').style.display="none";
    document.getElementById('desktop').style.display="block";
  }
}

// Handle Enter key for login
document.getElementById('pass').addEventListener('keydown', function(e){
  if(e.key==='Enter'){ login(); }
});

/* START MENU */
function toggleStart(){
  document.getElementById('startMenu').style.display = (document.getElementById('startMenu').style.display=="block")?"none":"block";
}
function closeStart(){document.getElementById('startMenu').style.display="none";}

/* APPS */
function openApp(url){
  if(url!="#") window.open(url,"_blank");
}

/* SHUTDOWN */
function shutdown(){
  document.getElementById('desktop').style.display="none";
  document.getElementById('shutdown').style.display="flex";

  setTimeout(()=>{
    document.getElementById('shutdown').style.display="none";
    document.getElementById('main').style.display="block";
  },2000);
}

/* Fullscreen Function */
function goFullScreen() {
  document.documentElement.requestFullscreen().catch(() => {
    alert("Fullscreen mode is not supported in this browser.");
  });
}

// Handle Enter key for login
document.getElementById('pass').addEventListener('keydown', function(e){
  if(e.key==='Enter'){ login(); }
});

// Ring sound after 5 mins (300000 ms)
setInterval(()=>{
  ringSound.play().catch(()=>{});
}, 300000);
</script>

</body>
  </html>
