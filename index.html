<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KCNX OS FINAL WINDOWS STYLE</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI";
}
body {
  overflow: hidden;
  background: black;
  color: white;
}
/* MAIN */
#main {
  width: 100%;
  height: 100vh;
  background: url('https://files.catbox.moe/s4uwrr.jpg') center/cover no-repeat;
  position: relative;
}
/* TIME (LEFT BOTTOM) */
#mainTime {
  position: absolute;
  bottom: 20px;
  left: 20px;
}
#mTime {
  font-size: 28px;
}
#mDate {
  font-size: 14px;
  opacity: 0.8;
}
/* >>> */
.start-btn {
  position: absolute;
  bottom: 20px;
  right: 20px;
  font-size: 22px;
  cursor: pointer;
}
/* BLUR LOGIN */
#blurLayer {
  position: absolute;
  width: 100%;
  height: 100%;
  backdrop-filter: blur(15px);
  background: rgba(0, 0, 0, 0.4);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 999;
}
.profile-img {
  width: 90px;
  height: 90px;
  object-fit: cover;
  border-radius: 50%;
}
.login-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  position: relative;
}
.login-container {
  display: flex;
  flex-direction: column;
  align-items: center;
}
.login-header {
  font-size: 24px;
  font-weight: bold;
  margin-bottom: 10px;
}
#pass {
  border-radius: 4px;
  padding: 10px 40px 10px 10px; /* extra padding for eye icon */
  width: 200px;
  font-size: 14px;
  position: relative;
}
#pass-container {
  position: relative;
  display: inline-block;
}
#toggleEye {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  width: 20px;
  height: 20px;
}
.arrow-btn {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 18px;
  border: none;
  background-color: rgba(255,255,255,0.2);
  cursor: pointer;
  margin-top: 10px;
}
/* KCNX Button (small, top right of login) */
#kcnxButton {
  position: absolute;
  top: 10px;
  right: 10px;
  font-size: 14px;
  background: rgba(255,255,255,0.2);
  border: none;
  padding: 4px 8px;
  border-radius: 4px;
  cursor:pointer;
  font-family: "Segoe UI";
  color: white;
}
#kcnxButton:hover {
  background: rgba(255,255,255,0.4);
}
/* Main desktop background - display page wallpaper after login */
#desktop {
  display: none;
  width: 100%;
  height: 100vh;
  background: url('https://files.catbox.moe/bjlapz.png') center/cover no-repeat;
  position: relative;
}
/* ICON GRID */
#desktopIcons {
  position: absolute;
  top: 20px;
  left: 20px;
  display: grid;
  grid-template-columns: repeat(1, 80px);
  grid-auto-rows: 90px;
  gap: 15px;
}
/* App icons styling */
.icon {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  width: 80px;
}
.icon img {
  width: 24px;
  height: 24px;
  object-fit: contain;
}
.icon span {
  font-size: 12px;
  margin-top: 5px;
  text-align: center;
}
/* TASKBAR */
#taskbar {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 50px;
  background: rgba(0, 0, 0, 0.7);
  display: flex;
  align-items: center;
  padding: 0 10px;
}
/* START MENU */
#startMenu {
  position: absolute;
  bottom: 50px;
  left: 0;
  width: 250px;
  height: 300px;
  background: rgba(0, 0, 0, 0.9);
  display: none;
  padding: 10px;
  border-radius: 4px;
}
.shutdown {
  margin-top: auto;
  background: red;
  padding: 5px;
  text-align: center;
  cursor: pointer;
}
/* TASK TIME */
#taskTime {
  margin-left: auto;
  padding: 10px;
}
/* SHUTDOWN overlay */
#shutdown {
  display: none;
  position: absolute;
  width: 100%;
  height: 100%;
  background: black;
  justify-content: center;
  align-items: center;
  font-size: 30px;
  z-index: 999;
}
/* Window menu for icon (shutdown, sleep, restart) */
#windowMenu {
  display: none;
  position: absolute;
  top: 50px;
  right: 10px;
  background: #222;
  border: 1px solid #555;
  padding: 10px;
  border-radius: 4px;
}
#windowMenu div {
  margin-bottom: 8px;
  cursor: pointer;
}
</style>
</head>
<body>

<!-- Background sound -->
<audio id="backgroundSound" src="https://files.catbox.moe/522394.mp3" loop></audio>
<!-- Ring sound -->
<audio id="ringSound" src="https://files.catbox.moe/522394.mp3"></audio>

<!-- MAIN -->
<div id="main">
  <div id="mainTime">
    <div id="mTime"></div>
    <div id="mDate"></div>
  </div>

  <!-- Modified button -->
  <div class="start-btn" onclick="showLogin(event)">>>> </div>

  <!-- KCNX Button (changed text) -->
  <button id="kcnxButton" onclick="goFullScreen()">[⌕]𓆉</button>

  <!-- Window icon -->
  <div id="windowIcon" style="position: absolute; top: 10px; right: 10px; cursor:pointer; width:24px; height:24px;" onclick="toggleWindowMenu()">
    <!-- SVG icon for window -->
    <svg width="24" height="24" viewBox="0 0 122.46 122.88" xmlns="http://www.w3.org/2000/svg" style="fill:#0078D6;">
      <path d="M0,17.53v41.52h50.07v-48.4L0,17.53L0,17.53z M56.11,9.68L122.46,0v58.63H56.11V9.68L56.11,9.68z M0,64.16 v41.52l50.07,7.01V64.16H0L0,64.16z M56.11,64.81h66.35v58.07l-66.35-9.4V64.81L56.11,64.81z"/>
    </svg>
  </div>

  <!-- Window menu -->
  <div id="windowMenu">
    <div onclick="shutdown()">Shutdown</div>
    <div onclick="sleep()">Sleep</div>
    <div onclick="restart()">Restart</div>
  </div>

  <!-- Login overlay -->
  <div id="blurLayer" onclick="closeBlur()" style="display:none; align-items:center; justify-content:center;">
    <div onclick="event.stopPropagation()" style="display:flex; flex-direction:column; align-items:center;">
      <!-- Admin Photo -->
      <img src="https://cdn-icons-png.flaticon.com/512/1077/1077114.png" alt="Admin" class="profile-img" style="width:100px; height:100px; margin-bottom:10px; border-radius:50%;" />

      <!-- Admin text -->
      <div style="font-size:24px; font-weight:bold; margin-bottom:10px;">admin</div>

      <!-- Password input with eye toggle -->
      <div id="pass-container" style="position:relative;">
        <input
          type="password"
          id="pass"
          placeholder="Enter password"
        />
        <!-- Eye icon for toggle -->
        <svg id="toggleEye" onclick="togglePassword()" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="fill:#fff;">
          <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zm0 13c-2.48 0-4.5-2.02-4.5-4.5S9.52 8.5 12 8.5 16.5 10.52 16.5 13 14.48 17.5 12 17.5zm0-7c-1.93 0-3.5 1.57-3.5 3.5S10.07 13.5 12 13.5 15.5 11.93 15.5 10 13.93 10 12 10z"/>
        </svg>
      </div>

      <!-- Arrow button -->
      <button class="arrow-btn" onclick="login()">→</button>
    </div>
  </div>
</div>

<!-- DESKTOP (display after login) -->
<div id="desktop">
  <!-- ICON GRID -->
  <div id="desktopIcons">
    <!-- Existing icons -->
    <div class="icon" onclick="openApp('https://www.bing.com')">
      <img src="https://cdn-icons-png.flaticon.com/512/732/732221.png" />
      <span>Microsoft Edge</span>
    </div>
    <div class="icon" onclick="openApp('https://www.bing.com')">
      <img src="https://cdn-icons-png.flaticon.com/512/300/300221.png" />
      <span>Bing</span>
    </div>
    <div class="icon" onclick="openApp('#')">
      <img src="https://i.ibb.co/DPcwkwjW/windows-10-recreation-file-and-internet-explorer-yellow-and-blue-folder-illustration-png-clipart.jpg" />
      <span>Folder</span>
    </div>
    <div class="icon" onclick="openApp('https://i.ibb.co/vxzNSDjR/recycling-bin-trash-rubbish-bins-waste-paper-baskets-computer-icons-window-thumbnail.jpg')">
      <img src="https://i.ibb.co/vxzNSDjR/recycling-bin-trash-rubbish-bins-waste-paper-baskets-computer-icons-window-thumbnail.jpg" />
      <span>Recycle Bin</span>
    </div>
    <!-- Additional apps -->
    <div class="icon" onclick="openApp('https://example.com')">
      <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/337/337946.png" alt="PC" /></a>
      <span>PC</span>
    </div>
    <div class="icon" onclick="openApp('https://example.com')">
      <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/2099/2099058.png" alt="Settings" /></a>
      <span>Settings</span>
    </div>
    <div class="icon" onclick="openApp('https://www.youtube.com')">
      <a href="https://www.youtube.com" target="_blank">
        <img src="https://i.ibb.co/VcpnZLcS/pngtree-youtube-social-media-3d-stereo-png-image-6308427.png" alt="YouTube" />
      </a>
      <span>YouTube</span>
    </div>
    <div class="icon" onclick="openApp('https://www.netflix.com')">
      <a href="https://www.netflix.com" target="_blank">
        <img src="https://i.ibb.co/zWQk939g/netflix-logo-transparent-background-free-png.png" alt="Netflix" />
      </a>
      <span>Netflix</span>
    </div>
    <!-- Google icon -->
    <div class="icon" onclick="openApp('https://www.google.com')">
      <a href="https://www.google.com" target="_blank">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" alt="Google" />
      </a>
      <span>Google</span>
    </div>
  </div>

  <!-- START MENU -->
  <div id="startMenu">
    <div>Start Menu</div>
    <div class="shutdown" onclick="shutdown()">Shutdown</div>
  </div>

  <!-- TASKBAR -->
  <div id="taskbar">
    <div id="taskbarWindowIcon" style="cursor:pointer; margin-right:10px;" onclick="toggleWindowMenu()">
      <!-- SVG icon for window -->
      <svg width="24" height="24" viewBox="0 0 122.46 122.88" xmlns="http://www.w3.org/2000/svg" style="fill:#0078D6;">
        <path d="M0,17.53v41.52h50.07v-48.4L0,17.53L0,17.53z M56.11,9.68L122.46,0v58.63H56.11V9.68L56.11,9.68z M0,64.16 v41.52l50.07,7.01V64.16H0L0,64.16z M56.11,64.81h66.35v58.07l-66.35-9.4V64.81L56.11,64.81z"/>
      </svg>
    </div>
    <div id="taskTime"></div>
    <!-- Example widgets -->
    <div style="margin-left:auto; display:flex; gap:10px; align-items:center;">
      <div style="font-size:14px;">Weather: Sunny</div>
      <div style="font-size:14px;">Sensex: +150 pts</div>
    </div>
  </div>
</div>

<!-- SHUTDOWN -->
<div id="shutdown">Shutting down...</div>

<script>
// Sound & Ring
const backgroundSound = document.getElementById("backgroundSound");
const ringSound = document.getElementById("ringSound");
window.onload = () => {
  backgroundSound.play().catch(()=>{});
  setTimeout(() => {
    ringSound.play().catch(()=>{});
  }, 5000);
};
// TIME
setInterval(()=>{
  const n = new Date();
  document.getElementById('mTime').innerText = n.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  document.getElementById('mDate').innerText = n.toDateString();
  document.getElementById('taskTime').innerText = n.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
},1000);
// LOGIN
function showLogin(e){e.stopPropagation();document.getElementById('blurLayer').style.display="flex";}
function closeBlur(){document.getElementById('blurLayer').style.display="none";}
function login(){
  const pw = document.getElementById('pass').value;
  if(pw==="12345"){
    document.getElementById('main').style.display="none";
    document.getElementById('desktop').style.display="block";
  }
}
// Toggle password visibility
function togglePassword() {
  const passInput = document.getElementById('pass');
  const icon = document.getElementById('toggleEye');
  if (passInput.type === "password") {
    passInput.type = "text";
    icon.innerHTML = `<path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zm0 13c-2.48 0-4.5-2.02-4.5-4.5S9.52 8.5 12 8.5 16.5 10.52 16.5 13 14.48 17.5 12 17.5zm0-7c-1.93 0-3.5 1.57-3.5 3.5S10.07 13.5 12 13.5 15.5 11.93 15.5 10 13.93 10 12 10z"/>`;
  } else {
    passInput.type = "password";
    icon.innerHTML = `<path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zm0 13c-2.48 0-4.5-2.02-4.5-4.5S9.52 8.5 12 8.5 16.5 10.52 16.5 13 14.48 17.5 12 17.5zm0-7c-1.93 0-3.5 1.57-3.5 3.5S10.07 13.5 12 13.5 15.5 11.93 15.5 10 13.93 10 12 10z"/>`;
  }
}
// Start login
function login(){
  const pw = document.getElementById('pass').value;
  if(pw==="12345"){
    document.getElementById('main').style.display="none";
    document.getElementById('desktop').style.display="block";
  }
}
document.getElementById('pass').addEventListener('keydown', function(e){
  if(e.key==='Enter'){ login(); }
});
// START MENU toggle
function toggleStart(){
  document.getElementById('startMenu').style.display = (document.getElementById('startMenu').style.display=="block")?"none":"block";
}
function closeStart(){document.getElementById('startMenu').style.display="none";}
// Apps
function openApp(url){
  if(url!="#") window.open(url,"_blank");
}
// Shutdown
function shutdown(){
  document.getElementById('desktop').style.display="none";
  document.getElementById('shutdown').style.display="flex";
  setTimeout(()=>{
    document.getElementById('shutdown').style.display="none";
    document.getElementById('main').style.display="block";
  },2000);
}
// Fullscreen
function goFullScreen() {
  document.documentElement.requestFullscreen().catch(() => {
    alert("Fullscreen mode is not supported in this browser.");
  });
}
// Toggle window menu
function toggleWindowMenu() {
  const menu = document.getElementById('windowMenu');
  menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
}
// Close window menu on outside click
document.addEventListener('click', (e) => {
  const menu = document.getElementById('windowMenu');
  if (menu && !menu.contains(e.target) && e.target.id !== 'taskbarWindowIcon') {
    menu.style.display = 'none';
  }
});
// Window menu actions
function sleep() {
  alert('Sleep mode (simulate)');
}
function restart() {
  alert('Restart (simulate)');
}
</script>
</body>
</html>
